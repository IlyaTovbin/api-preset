services:
  api:
    build: .
    container_name: property-mg-api
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/property_mg?schema=public
    volumes:
      - .:/app
      - /app/node_modules
  db:
    image: postgres:16-alpine
    container_name: property-mg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: property_mg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d property_mg"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
